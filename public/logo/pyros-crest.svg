<svg id="pyros-crest" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Outer octagonal border -->
  <g id="crest-border">
    <polygon
      points="70,10 130,10 190,70 190,130 130,190 70,190 10,130 10,70"
      stroke="#C9A84C"
      stroke-width="2"
      fill="#0A0A0A"
    />
    <polygon
      points="72,14 128,14 186,72 186,128 128,186 72,186 14,128 14,72"
      stroke="#3D3120"
      stroke-width="0.5"
      fill="none"
    />
  </g>

  <!-- Top-left quadrant: Art — Palette -->
  <g id="quadrant-art" transform="translate(40, 40)">
    <circle cx="20" cy="20" r="14" stroke="#C9A84C" stroke-width="1.2" fill="none" opacity="0.7"/>
    <circle cx="14" cy="16" r="2.5" fill="#C9A84C" opacity="0.8"/>
    <circle cx="20" cy="10" r="2.5" fill="#C9A84C" opacity="0.8"/>
    <circle cx="26" cy="16" r="2.5" fill="#8B1A1A" opacity="0.9"/>
    <circle cx="24" cy="24" r="2.5" fill="#C9A84C" opacity="0.8"/>
    <circle cx="16" cy="24" r="2.5" fill="#C9A84C" opacity="0.7"/>
    <path d="M20 26 Q22 30 18 32" stroke="#C9A84C" stroke-width="1" fill="none" opacity="0.6"/>
  </g>

  <!-- Top-right quadrant: Dance — Silhouette -->
  <g id="quadrant-dance" transform="translate(120, 40)">
    <circle cx="20" cy="8" r="5" stroke="#C9A84C" stroke-width="1.2" fill="none" opacity="0.8"/>
    <line x1="20" y1="13" x2="20" y2="26" stroke="#C9A84C" stroke-width="1.2" opacity="0.8"/>
    <line x1="20" y1="18" x2="12" y2="24" stroke="#C9A84C" stroke-width="1.2" opacity="0.8"/>
    <line x1="20" y1="18" x2="28" y2="14" stroke="#C9A84C" stroke-width="1.2" opacity="0.8"/>
    <line x1="20" y1="26" x2="14" y2="34" stroke="#C9A84C" stroke-width="1.2" opacity="0.8"/>
    <line x1="20" y1="26" x2="28" y2="32" stroke="#C9A84C" stroke-width="1.2" opacity="0.8"/>
  </g>

  <!-- Center: Music — Flame + Note -->
  <g id="quadrant-music" transform="translate(85, 75)">
    <!-- Flame -->
    <path
      d="M15 32 C10 24 6 18 12 10 C12 14 16 12 15 8 C20 12 24 10 22 16 C26 12 28 16 24 22 C26 20 28 24 24 28 C22 32 18 34 15 32Z"
      fill="#C9A84C"
      opacity="0.9"
    />
    <path
      d="M15 30 C12 24 10 20 13 14 C14 16 16 15 15 12 C18 15 20 14 19 18 C22 15 23 18 21 22 C22 21 23 24 21 27 C19 30 17 31 15 30Z"
      fill="#8B1A1A"
      opacity="0.8"
    />
  </g>

  <!-- Bottom-left quadrant: Gaming — Controller -->
  <g id="quadrant-gaming" transform="translate(40, 120)">
    <rect x="8" y="14" width="24" height="14" rx="5" stroke="#C9A84C" stroke-width="1.2" fill="none" opacity="0.7"/>
    <line x1="8" y1="21" x2="32" y2="21" stroke="#C9A84C" stroke-width="0.5" opacity="0.4"/>
    <circle cx="25" cy="18" r="2" fill="#C9A84C" opacity="0.8"/>
    <circle cx="28" cy="21" r="2" fill="#8B1A1A" opacity="0.8"/>
    <line x1="14" y1="17" x2="14" y2="25" stroke="#C9A84C" stroke-width="1.2" opacity="0.7"/>
    <line x1="10" y1="21" x2="18" y2="21" stroke="#C9A84C" stroke-width="1.2" opacity="0.7"/>
  </g>

  <!-- Bottom-right quadrant: Drama — Theatre Masks -->
  <g id="quadrant-drama" transform="translate(120, 120)">
    <!-- Happy mask -->
    <path d="M12 14 Q16 10 20 14 Q20 22 16 24 Q12 22 12 14Z" stroke="#C9A84C" stroke-width="1" fill="none" opacity="0.8"/>
    <path d="M13.5 20 Q16 22 18.5 20" stroke="#C9A84C" stroke-width="0.8" fill="none" opacity="0.7"/>
    <!-- Sad mask -->
    <path d="M20 18 Q24 14 28 18 Q28 26 24 28 Q20 26 20 18Z" stroke="#C9A84C" stroke-width="1" fill="none" opacity="0.6"/>
    <path d="M21.5 24 Q24 22 26.5 24" stroke="#C9A84C" stroke-width="0.8" fill="none" opacity="0.6"/>
  </g>

  <!-- Center PYROS text -->
  <text
    x="100"
    y="68"
    text-anchor="middle"
    font-family="'Bebas Neue', sans-serif"
    font-size="9"
    fill="#C9A84C"
    letter-spacing="3"
    opacity="0.5"
  >PYROS</text>

  <!-- Inner decorative lines -->
  <line x1="100" y1="30" x2="100" y2="80" stroke="#2A2218" stroke-width="0.5" opacity="0.6"/>
  <line x1="100" y1="120" x2="100" y2="170" stroke="#2A2218" stroke-width="0.5" opacity="0.6"/>
  <line x1="30" y1="100" x2="80" y2="100" stroke="#2A2218" stroke-width="0.5" opacity="0.6"/>
  <line x1="120" y1="100" x2="170" y2="100" stroke="#2A2218" stroke-width="0.5" opacity="0.6"/>
</svg>
